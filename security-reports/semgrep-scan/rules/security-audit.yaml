rules:
  # === XSS via href/src with user input ===
  - id: xss-href-javascript-protocol
    pattern: 'href="javascript:..."'
    message: >-
      JavaScript protocol in href attribute can lead to XSS. Avoid
      javascript: URLs entirely.
    languages: [typescript, javascript]
    severity: ERROR
    metadata:
      cwe: ["CWE-79"]
      category: security

  # === Insecure URL construction ===
  - id: insecure-url-construction
    patterns:
      - pattern: new URL($INPUT)
      - pattern-not: new URL("...")
      - pattern-not: new URL("...", ...)
    message: >-
      URL constructed from potentially user-controlled input. Validate
      and sanitize the input to prevent SSRF or open redirect.
    languages: [typescript, javascript]
    severity: WARNING
    metadata:
      cwe: ["CWE-918"]
      category: security

  # === Sensitive data in URL/query params ===
  - id: sensitive-data-in-url
    patterns:
      - pattern-either:
          - pattern: '`...?token=${...}...`'
          - pattern: '`...?key=${...}...`'
          - pattern: '`...?secret=${...}...`'
          - pattern: '`...?password=${...}...`'
          - pattern: '`...&token=${...}...`'
          - pattern: '`...&key=${...}...`'
          - pattern: '`...&secret=${...}...`'
    message: >-
      Sensitive data (token/key/secret) may be passed via URL query
      parameters. This can be logged in server access logs or browser
      history. Use request body or headers instead.
    languages: [typescript, javascript]
    severity: WARNING
    metadata:
      cwe: ["CWE-598"]
      category: security

  # === Helmet / Security Headers ===
  - id: missing-nosniff-header
    patterns:
      - pattern: NextResponse.json(...)
      - pattern-not-inside: |
          ...
          X-Content-Type-Options
          ...
    message: >-
      API response may be missing X-Content-Type-Options header. Set
      'nosniff' to prevent MIME type sniffing.
    languages: [typescript, javascript]
    severity: WARNING
    metadata:
      cwe: ["CWE-693"]
      category: security

  # === Unsafe Buffer handling ===
  - id: buffer-from-string
    pattern: Buffer.from($INPUT, "hex")
    message: >-
      Buffer.from with hex encoding. Ensure input is validated as
      proper hex to prevent unexpected behavior.
    languages: [typescript, javascript]
    severity: WARNING
    metadata:
      cwe: ["CWE-20"]
      category: security

  # === Unvalidated Solana public key ===
  - id: solana-unvalidated-pubkey
    patterns:
      - pattern: new PublicKey($INPUT)
      - pattern-not: new PublicKey("...")
    message: >-
      Solana PublicKey created from potentially user-controlled input.
      Validate the input is a proper base58 string and handle errors.
    languages: [typescript, javascript]
    severity: WARNING
    metadata:
      cwe: ["CWE-20"]
      category: security

  # === Insufficient input validation ===
  - id: parseInt-without-radix
    pattern: parseInt($INPUT)
    message: >-
      parseInt() called without explicit radix. Always specify radix
      (e.g., parseInt(input, 10)) to avoid unexpected octal/hex parsing.
    languages: [typescript, javascript]
    severity: WARNING
    metadata:
      cwe: ["CWE-20"]
      category: security

  # === Unchecked array access ===
  - id: unguarded-await-json
    patterns:
      - pattern: |
          const $BODY = await $REQ.json()
      - pattern-not-inside: |
          try { ... } catch (...) { ... }
    message: >-
      Request body parsed with .json() without try-catch. Malformed
      JSON will throw an unhandled error, potentially crashing the
      handler.
    languages: [typescript, javascript]
    severity: WARNING
    metadata:
      cwe: ["CWE-20"]
      category: security

  # === Prototype pollution via object spread ===
  - id: object-keys-no-hasownproperty
    pattern: "for (const $KEY in $OBJ) { ... }"
    message: >-
      for...in loop iterates over inherited properties. Use
      Object.keys(), Object.hasOwn(), or hasOwnProperty() check.
    languages: [typescript, javascript]
    severity: WARNING
    metadata:
      cwe: ["CWE-1321"]
      category: security

  # === Encryption key derivation ===
  - id: static-encryption-iv
    patterns:
      - pattern-either:
          - pattern: 'createCipheriv($ALG, $KEY, "")'
          - pattern: "createCipheriv($ALG, $KEY, Buffer.alloc(...))"
    message: >-
      Cipher initialized with potentially static/zero IV. Use a
      random IV for each encryption operation to ensure semantic
      security.
    languages: [typescript, javascript]
    severity: ERROR
    metadata:
      cwe: ["CWE-329"]
      category: security

  # === HTTP response splitting ===
  - id: header-injection
    patterns:
      - pattern: |
          $RESP.headers.set($NAME, $VALUE)
      - pattern-not: |
          $RESP.headers.set("...", "...")
    message: >-
      HTTP header set with potentially user-controlled value. Validate
      header values to prevent header injection/response splitting.
    languages: [typescript, javascript]
    severity: WARNING
    metadata:
      cwe: ["CWE-113"]
      category: security

  # === Insecure TLS ===
  - id: tls-reject-unauthorized-false
    pattern: 'rejectUnauthorized: false'
    message: >-
      TLS certificate verification disabled. This makes the connection
      vulnerable to man-in-the-middle attacks.
    languages: [typescript, javascript]
    severity: ERROR
    metadata:
      cwe: ["CWE-295"]
      category: security

  # === Debug/development code in production ===
  - id: debug-console-log
    pattern: console.log(...)
    message: >-
      console.log() found in production code. Excessive logging may
      leak sensitive information. Use a proper logging framework with
      appropriate log levels.
    languages: [typescript, javascript]
    severity: WARNING
    metadata:
      cwe: ["CWE-532"]
      category: security

  # === Insecure session config ===
  - id: session-no-secure-cookie
    pattern: 'session: { ..., strategy: "jwt", ... }'
    message: >-
      Session configuration found. Ensure cookies have secure, httpOnly,
      and sameSite flags set appropriately.
    languages: [typescript, javascript]
    severity: WARNING
    metadata:
      cwe: ["CWE-614"]
      category: security

  # === Catch-all error handler swallowing errors ===
  - id: empty-catch-block
    pattern: "catch ($ERR) { }"
    message: >-
      Empty catch block swallows errors silently. At minimum, log the
      error for debugging purposes.
    languages: [typescript, javascript]
    severity: WARNING
    metadata:
      cwe: ["CWE-390"]
      category: security

  # === Unsafe type assertion ===
  - id: unsafe-type-assertion-any
    pattern: $EXPR as any
    message: >-
      Type assertion to 'any' bypasses TypeScript type checking. This
      can hide type errors that lead to runtime vulnerabilities.
    languages: [typescript]
    severity: WARNING
    metadata:
      cwe: ["CWE-704"]
      category: security
