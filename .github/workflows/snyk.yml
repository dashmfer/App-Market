name: Snyk Security Scan

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    - cron: "0 6 * * 1" # Weekly Monday 6am UTC

jobs:
  snyk-dependencies:
    name: Snyk Dependency Scan
    runs-on: ubuntu-latest
    if: ${{ secrets.SNYK_TOKEN != '' }}
    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm ci

      - name: Run Snyk to check for vulnerabilities
        uses: snyk/actions/node@cdb760004ba9ea4d525f2e043745dfe85bb9077e # v1.1110.0
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=medium --sarif-file-output=snyk-deps.sarif

      - name: Upload Snyk dependency results to GitHub Security
        uses: github/codeql-action/upload-sarif@v4
        if: success() && hashFiles('snyk-deps.sarif') != ''
        with:
          sarif_file: snyk-deps.sarif
          category: snyk-dependencies

  snyk-code:
    name: Snyk Code (SAST)
    runs-on: ubuntu-latest
    if: ${{ secrets.SNYK_TOKEN != '' }}
    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Snyk Code
        uses: snyk/actions/node@cdb760004ba9ea4d525f2e043745dfe85bb9077e # v1.1110.0
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          command: code test
          args: --sarif-file-output=snyk-code.sarif

      - name: Upload Snyk Code results to GitHub Security
        uses: github/codeql-action/upload-sarif@v4
        if: success() && hashFiles('snyk-code.sarif') != ''
        with:
          sarif_file: snyk-code.sarif
          category: snyk-code
